name: Routenplaner
options:
  bundleIdPrefix: com.routenplaner
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    exactVersion: 0.12.1
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  GoogleMaps:
    url: https://github.com/googlemaps/ios-maps-sdk
    from: "9.0.0"
settings:
  base:
    MARKETING_VERSION: "1.5.0"
    CURRENT_PROJECT_VERSION: "17"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: "NO"
targets:
  Routenplaner:
    type: application
    platform: iOS
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    sources:
      - path: App
      - path: RoutenplanerLogic/Sources/RoutenplanerLogic
    dependencies:
      - package: Citadel
        product: Citadel
      - package: GRDB
        product: GRDB
      - package: GoogleMaps
        product: GoogleMaps
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.routenplaner.app
        PRODUCT_NAME: Routenplaner
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
# One explicit, SHARED scheme named exactly "Routenplaner" (do NOT also add a
# target-level `scheme:` block — that would create a second, colliding scheme).
schemes:
  Routenplaner:
    build:
      targets:
        Routenplaner: all
    run:
      config: Debug
    archive:
      config: Release
