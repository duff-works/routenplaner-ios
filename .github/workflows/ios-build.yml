name: iOS Build (ad-hoc, for Sideloadly)

on:
  push:
    paths:
      - "App/**"
      - "RoutenplanerLogic/**"
      - "project.yml"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  build:
    # macos-26 (default Xcode 26) — required by the Google Maps iOS SDK (Phase 5).
    # Using the runner's DEFAULT Xcode so it matches the installed iOS runtime (avoids
    # the generic/platform=iOS device-destination ineligibility seen when a forced Xcode
    # mismatches the runtime — see the Xcode-16.4 note in git history).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show selected Xcode
        run: xcodebuild -version

      - name: Materialize Secrets.xcconfig
        run: printf 'MAPS_API_KEY = %s\n' "${MAPS_API_KEY:-placeholder}" > Secrets.xcconfig
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Verify shared scheme exists
        run: xcodebuild -list -project Routenplaner.xcodeproj | grep -q "Routenplaner"

      - name: Diagnostics (SDKs + destinations, non-fatal)
        run: |
          echo "--- installed iOS SDKs ---"; xcodebuild -showsdks | grep -i ios || true
          echo "--- destinations for scheme ---"; xcodebuild -showdestinations -project Routenplaner.xcodeproj -scheme Routenplaner 2>&1 | head -30 || true

      - name: Unit test logic package
        run: swift test --package-path RoutenplanerLogic

      - name: Typecheck (fast fail before archive)
        run: |
          xcodebuild build \
            -project Routenplaner.xcodeproj -scheme Routenplaner \
            -configuration Release -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive (unsigned)
        run: |
          xcodebuild archive \
            -project Routenplaner.xcodeproj -scheme Routenplaner -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/Routenplaner.xcarchive" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Ad-hoc sign (frameworks then app)
        run: |
          APP="build/Routenplaner.xcarchive/Products/Applications/Routenplaner.app"
          if [ -d "$APP/Frameworks" ]; then
            for fw in "$APP"/Frameworks/*.framework; do
              [ -e "$fw" ] && codesign --force --sign - "$fw"
            done
          fi
          codesign --force --sign - "$APP"

      - name: Verify signature + device platform (gate)
        run: |
          APP="build/Routenplaner.xcarchive/Products/Applications/Routenplaner.app"
          BIN="$APP/Routenplaner"
          otool -l "$BIN" | grep -q LC_CODE_SIGNATURE || { echo "app binary not signed"; exit 1; }
          otool -l "$BIN" | grep -A4 LC_BUILD_VERSION | grep -q "platform 2" || { echo "not a device build"; exit 1; }
          if [ -d "$APP/Frameworks" ]; then
            for fw in "$APP"/Frameworks/*.framework; do
              [ -e "$fw" ] || continue
              name="$(basename "$fw" .framework)"
              otool -l "$fw/$name" | grep -q LC_CODE_SIGNATURE || { echo "unsigned framework: $fw"; exit 1; }
            done
          fi
          echo "gate passed"

      - name: Package IPA (Payload/ at top level)
        run: |
          APP="build/Routenplaner.xcarchive/Products/Applications/Routenplaner.app"
          mkdir -p build/ipa/Payload
          cp -R "$APP" build/ipa/Payload/
          ( cd build/ipa && zip -qry ../Routenplaner-adhoc.ipa Payload )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Routenplaner-adhoc-ipa
          path: build/Routenplaner-adhoc.ipa
          if-no-files-found: error
